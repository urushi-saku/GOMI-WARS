# Render デプロイ設定
# ドキュメント: https://render.com/docs/blueprint-spec

services:
  # APIサーバー（Express）
  - type: web
    name: gomi-wars-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false                  # Render ダッシュボードで手動設定
      - key: FRONTEND_URL
        sync: false                  # Render ダッシュボードで手動設定
      # Firebase Admin SDK の認証情報（JSON を 1 行にした Base64 文字列で設定）
      - key: GOOGLE_APPLICATION_CREDENTIALS_BASE64
        sync: false                  # Render ダッシュボードで手動設定
    healthCheckPath: /health        # Render がサーバーの起動確認に使う

  # フロントエンド（React + Vite）
  - type: web
    name: gomi-wars-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run preview
    envVars:
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
      - key: VITE_API_BASE_URL
        value: https://gomi-wars-api.onrender.com
